name: Track downloads

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          path: main

      - name: Check out traffic data branch
        uses: actions/checkout@v4
        with:
          ref: traffic
          path: traffic

      - name: Update clone history and badge
        env:
          # The default GITHUB_TOKEN cannot read traffic stats; this must be a
          # PAT with Administration (read) permission on this repository.
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}
          DATA_DIR: traffic
        run: python3 main/.github/scripts/update_traffic.py

      - name: Commit and push
        working-directory: traffic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clones.json badge.json
          if git diff --cached --quiet; then
            echo "No new traffic data"
          else
            git commit -m "Update clone traffic data"
            git push origin traffic
          fi
