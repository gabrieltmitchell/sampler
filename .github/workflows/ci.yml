name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift:
    name: Swift Package and Example
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Dump package
        run: swift package dump-package > /tmp/sampler-package.json

      - name: Build package
        run: |
          swift build
          swift build -c release

      - name: Build example app
        run: |
          xcodebuild \
            -project Example/SamplerExample.xcodeproj \
            -scheme SamplerExample \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build
          xcodebuild \
            -project Example/SamplerExample.xcodeproj \
            -scheme SamplerExample \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            build

  mcp:
    name: sampler-mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: node dist/index.js doctor --store /tmp/sampler-mcp-doctor
